<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="form">
        <h2>Job application ( Web )</h2>
        <div class="input">
            <div class="grid">

                <div class="name">
                    <h4>Name</h4> <input type="text" placeholder="Enter your Name ">
                </div>
                <div class="lastName">
                    <h4>Last Name</h4> <input type="text" placeholder="Enter your Last Name ">
                </div>
                <div class="email">
                    <h4>Email</h4> <input type="email" placeholder="Enter your email ">
                </div>
                <div class="job">
                    <h4>Job Role</h4> <select name="jobRol" id="jobRol">
                        <option value="1"> Select Job Role </option>
                        <option value="2">3</option>
                        <option value="3">2</option>
                        <option value="4">1</option>
                    </select>
                </div>

            </div>

            <div class="add">
                <h4>Address</h4> <textarea name="Address" id="Address" placeholder="Enter Your Address"
                    rows="4"></textarea>
            </div>
            <div class="grid">

                <div class="city">
                    <h4>Enter your city</h4> <input type="text" placeholder=" your city name ">
                </div>
                <div class="pincode">
                    <h4>Pincode</h4> <input type="number" placeholder="Enter your Pincode">
                </div>
                <div class="date">
                    <h4>Start Date</h4> <input type="date">
                </div>
                <div class="cv">
                    <h4>Upload Your CV</h4> <input type="file">
                </div>
            </div>
            <button>Apply Now</button>
        </div>
    </div>
</body>

</html>
